proxy_cache_path /www/dk_project/sites/ip.jasson.cv/proxy_cache_dir levels=1:2 keys_zone=ip_jasson_cv_cache:20m inactive=1d max_size=5g;

server {
    listen 80;
    
    listen 443 ssl  ;
    http2 on;
    
    server_name www.ip1234.cc ip1234.cc;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/dk_project/wwwroot/ip.jasson.cv;
    include /www/server/panel/vhost/nginx/extension/ip.jasson.cv/*.conf;
    

    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/ip.jasson.cv.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/ip.jasson.cv/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/ip.jasson.cv/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END
    #REDIRECT START
    
    
    #REDIRECT END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP引用配置，可以注释或修改
    
    
    #PHP-INFO-END
    
    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
    location = /bdunion.txt {
    allow all;
    log_not_found off;
    access_log off;
    root /www/dk_project/wwwroot/ip.jasson.cv;
}
location = /custom.js {
    allow all;
    log_not_found off;
    access_log off;
    root /www/dk_project/wwwroot/ip.jasson.cv;
}
location = /sw.js {
    allow all;
    log_not_found off;
    access_log off;
    root /www/dk_project/wwwroot/ip.jasson.cv;
}
location = /ad-inject.js {
    allow all;
    log_not_found off;
    access_log off;
    root /www/dk_project/wwwroot/ip.jasson.cv;
}
    #REWRITE-END

    #IP-RESTRICT-START 限制访问ip的配置，IP黑白名单
    
    
    #IP-RESTRICT-END

    #BASICAUTH START
    
    #BASICAUTH END

    #SUB_FILTER START
    #SUB_FILTER END

    #GZIP START
    
    #GZIP END

    #GLOBAL-CACHE START
    
    #GLOBAL-CACHE END

    #WEBSOCKET-SUPPORT START
    proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    #WEBSOCKET-SUPPORT END

    #PROXY-CONF-START
    location ^~ / {
      proxy_set_header Accept-Encoding "";
      sub_filter '</head>' '<script>try{var p=JSON.parse(localStorage.getItem("userPreferences")||"{}");if(p.ipCardsToShow!==2){p.ipCardsToShow=2;localStorage.setItem("userPreferences",JSON.stringify(p));}}catch(e){}</script><style>a[href="/articles/"], a[href="/articles"] { display: none !important; }</style></head>';
      sub_filter '</body>' '<script src="/custom.js?v=26"></script></body>';
      sub_filter 'https://github.com/jason5ng32/MyIP' 'https://www.jasson.online/';
      sub_filter '赞助' '博客';
      sub_filter ' 💖 ' '';

      sub_filter_once off;
      sub_filter_types application/javascript text/javascript;
      
      proxy_pass http://127.0.0.1:18966;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Real-Port $remote_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header REMOTE-HOST $remote_addr;
      
      proxy_buffering on;
      proxy_cache ip_jasson_cv_cache;
      proxy_cache_valid 200 304 12h;
      proxy_cache_key $host$uri$is_args$args;
      # proxy_cache_bypass 1;
      # proxy_no_cache 1;
      proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      
      
      
      
      
    }
    
    #PROXY-CONF-END

    #SERVER-BLOCK START
    
    #SERVER-BLOCK END

    # 禁止访问的敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$
    {
        return 404;
    }
    
    # 禁止访问的敏感目录
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location /.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    #LOG START
    
access_log  /www/wwwlogs/ip.jasson.cv.log;
    error_log  /www/wwwlogs/ip.jasson.cv.error.log;
    
    #LOG END
}